openapi: "3.0.3"
info:
  title: "Pet Store API"
  description: "A sample OpenAPI 3.x Pet Store specification"
  version: "1.0.0"

servers:
  - url: "https://api.petstore.example.com/v3"
    description: "Production server"

paths:
  /pets:
    get:
      operationId: listPets
      summary: List all pets
      responses:
        "200":
          description: A list of pets
    post:
      operationId: createPet
      summary: Create a pet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: Created

  /pets/{petId}:
    get:
      operationId: getPetById
      summary: Get a pet by ID
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: A single pet
    put:
      operationId: updatePet
      summary: Update a pet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Updated
    delete:
      operationId: deletePet
      summary: Delete a pet
      responses:
        "204":
          description: Deleted

  /pets/{petId}/photos:
    get:
      operationId: listPetPhotos
      summary: List photos for a pet
      responses:
        "200":
          description: A list of photos
    post:
      operationId: uploadPetPhoto
      summary: Upload a photo for a pet
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
      responses:
        "201":
          description: Uploaded

  /store/inventory:
    get:
      operationId: getInventory
      summary: Get store inventory
      responses:
        "200":
          description: Inventory status

  /store/orders:
    post:
      operationId: placeOrder
      summary: Place an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: Order placed
